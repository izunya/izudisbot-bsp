name: Build & Release

# 버전 태그(v0.1.0 등)를 push 하면 자동으로 빌드 → zip → Release 업로드.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Release 생성/업로드에 필요

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 게임 전용 참조 DLL(UnityEngine*, ChatPlexSDK_BS, IPA.Loader 등)을
      # base64 Secret 에서 풀어서 러너에 게임 폴더 구조로 복원한다.
      # Secret 이름: BS_REFS_B64  (tools/pack-refs.ps1 로 생성)
      - name: Restore reference assemblies
        shell: pwsh
        env:
          BS_REFS_B64: ${{ secrets.BS_REFS_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BS_REFS_B64)) {
            Write-Error "Secret 'BS_REFS_B64' 가 설정되어 있지 않습니다. tools/pack-refs.ps1 참고."
            exit 1
          }
          [IO.File]::WriteAllBytes("refs.zip", [Convert]::FromBase64String($env:BS_REFS_B64))
          $dest = Join-Path $env:GITHUB_WORKSPACE "_refs"
          Expand-Archive -Path "refs.zip" -DestinationPath $dest -Force
          Write-Host "Restored refs to $dest"

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "version=$v"

      - name: Build (Release)
        shell: pwsh
        env:
          # Directory.Build.props 의 BeatSaberDir 를 복원한 _refs 로 덮어쓴다.
          BeatSaberDir: ${{ github.workspace }}\_refs
        run: dotnet build izudisbot-bsp.csproj -c Release -p:Version=${{ steps.ver.outputs.version }}

      - name: Package zip
        shell: pwsh
        run: |
          $dll = "bin\Release\izudisbot-bsp.dll"
          if (!(Test-Path $dll)) { Write-Error "빌드 산출물을 찾을 수 없습니다: $dll"; exit 1 }
          # Beat Saber 루트에 압축을 풀면 곧바로 Plugins\ 로 들어가는 구조.
          New-Item -ItemType Directory -Force -Path "package\Plugins" | Out-Null
          Copy-Item $dll "package\Plugins\"
          $zip = "izudisbot-bsp-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path "package\*" -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: izudisbot-bsp ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            izudisbot-bsp-${{ steps.ver.outputs.version }}.zip